<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnkiVocab Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
        }

        input,
        textarea {
            background-color: #1e1e1e !important;
            color: #ffffff !important;
            border-color: #333333 !important;
        }

        /* Fixes autofill background without breaking cursor visibility */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        textarea:-webkit-autofill,
        textarea:-webkit-autofill:hover,
        textarea:-webkit-autofill:focus {
            background-color: #1e1e1e !important;
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>

<body class="font-sans min-h-screen flex flex-col items-center justify-center py-10 px-4">

    <div id="loading-overlay" class="hidden fixed inset-0 bg-[#121212] z-50 flex items-center justify-center">
        <div class="text-teal-400 text-xl font-bold animate-pulse" id="loading-text">読み込み中...</div>
    </div>

    <div id="main-container" class="w-full max-w-2xl
           bg-[#1a1a1aee]
           backdrop-blur-xl
           border border-[#2a2a2a]
           rounded-3xl
           shadow-[0_20px_60px_rgba(0,0,0,0.45)]
           p-7
           transition-all duration-300">
        <h1 class="text-2xl font-bold text-center text-teal-400 mb-6">
            語彙追加
        </h1>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">単語 (Word)</label>
                <input type="text" id="field-tango" autocomplete="off" placeholder="単語を入力..."
                    class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-1 focus:ring-teal-500">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">読み方
                        (Reading)</label>
                    <input type="text" id="field-yomikata"
                        class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-1 focus:ring-teal-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">振り仮名
                        (Furigana)</label>
                    <input type="text" id="field-furigana"
                        class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-1 focus:ring-teal-500">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">意味
                    (Meaning)</label>
                <textarea id="field-imi" rows="2"
                    class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-1 focus:ring-teal-500"></textarea>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">例文 (Example
                    Sentence)</label>
                <textarea id="field-reibun" rows="2"
                    class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-1 focus:ring-teal-500"></textarea>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">翻訳
                    (Translation)</label>
                <textarea id="field-honyaku" rows="2"
                    class="w-full px-3 py-2 rounded-lg border focus:outline-none focus:ring-1 focus:ring-teal-500"></textarea>
            </div>

            <button onclick="addToAnki()"
                class="w-full mt-6 bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg shadow-lg transition tracking-wide">
                暗記追加
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal"
        class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center">

        <div class="w-full max-w-md bg-[#1a1a1a] border border-[#333333] rounded-2xl shadow-2xl p-6">

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-teal-400">
                    Anki Settings
                </h2>

                <button id="close-settings" class="text-gray-400 hover:text-white text-2xl">
                    ×
                </button>
            </div>

            <!-- Deck -->
            <div class="mb-5">
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-2">
                    Deck Name
                </label>

                <input id="deck-name" type="text" autocomplete="off" class="w-full px-3 py-2 rounded-lg border">
            </div>

            <!-- Note Type -->
            <div class="mb-6">
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-2">
                    Note Type
                </label>

                <input id="note-type" type="text" autocomplete="off" class="w-full px-3 py-2 rounded-lg border">
            </div>

            <button id="save-settings"
                class="w-full py-3 rounded-xl bg-teal-600 hover:bg-teal-700 font-bold transition">
                Save Settings
            </button>
        </div>
    </div>

    <!-- Floating Settings Button -->
    <button id="settings-btn" class="fixed bottom-6 right-6 z-40 w-14 h-14 rounded-2xl
           bg-[#1f1f1fcc]
           backdrop-blur-xl
           border border-[#333333]
           text-teal-400
           shadow-2xl
           flex items-center justify-center
           hover:border-teal-500
           hover:text-white
           hover:rotate-90
           transition-all duration-300">

        <i data-lucide="settings-2" class="w-6 h-6"></i>

    </button>

    <script>

        const settingsBtn = document.getElementById("settings-btn");
        const settingsModal = document.getElementById("settings-modal");
        const closeSettings = document.getElementById("close-settings");
        const saveSettings = document.getElementById("save-settings");

        settingsBtn.addEventListener("click", () => {
            settingsModal.classList.remove("hidden");
        });

        closeSettings.addEventListener("click", () => {
            settingsModal.classList.add("hidden");
        });

        settingsModal.addEventListener("click", e => {
            if (e.target === settingsModal) {
                settingsModal.classList.add("hidden");
            }
        });

        function loadSettings() {
            document.getElementById("deck-name").value =
                localStorage.getItem("ankiDeck") || "";

            document.getElementById("note-type").value =
                localStorage.getItem("ankiModel") || "";
        }

        function updateAddButtonState() {
            const deck = localStorage.getItem("ankiDeck")?.trim();
            const model = localStorage.getItem("ankiModel")?.trim();
            document.querySelector("button[onclick='addToAnki()']").disabled = !(deck && model);
        }

        saveSettings.addEventListener("click", () => {

            const deckName = document.getElementById("deck-name").value.trim();
            const noteType = document.getElementById("note-type").value.trim();

            localStorage.setItem("ankiDeck", deckName);
            localStorage.setItem("ankiModel", noteType);

            settingsModal.classList.add("hidden");
        });

        loadSettings();

        document.getElementById('field-tango').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                fetchWordData();
            }
        });

        const delay = ms => new Promise(res => setTimeout(res, ms));

        function toggleLoading(show, text = "読み込み中...") {
            const overlay = document.getElementById('loading-overlay');
            document.getElementById('loading-text').innerText = text;
            overlay.classList.toggle('hidden', !show);
            document.getElementById('main-container').classList.toggle('hidden', show);
        }

        function clearFields() {
            document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        }

        async function fetchWordData() {
            const query = document.getElementById('field-tango').value.trim();
            if (!query) return;
            toggleLoading(true, "検索中...");

            // Direct call: No need for the python proxy
            const url = `https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (!data.data || data.data.length === 0) throw new Error("No results found.");
                const entry = data.data[0];
                const tango = entry.japanese[0].word || entry.japanese[0].reading;
                const yomikata = entry.japanese[0].reading;

                document.getElementById('field-tango').value = tango;
                document.getElementById('field-yomikata').value = yomikata;
                document.getElementById('field-furigana').value = generateAnkiFurigana(tango, yomikata);
                document.getElementById('field-imi').value = entry.senses.slice(0, 3).map(s => s.english_definitions.join(', ')).join(', ');

                await fetchSentenceData(tango);
            } catch (err) {
                alert("Fetch failed: " + err.message);
            } finally {
                toggleLoading(false);
            }
        }

        async function fetchSentenceData(word) {
            const url = `https://tatoeba.org/en/api_v0/search?from=jpn&to=eng&query=${encodeURIComponent(word)}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    const match = data.results[0];
                    document.getElementById('field-reibun').value = match.text;
                    const eng = match.translations.flat().find(t => t.lang === 'eng');
                    document.getElementById('field-honyaku').value = eng ? eng.text : "";
                }
            } catch (e) {
                console.error("Sentence fetch failed");
            }
        }

        async function addToAnki() {

            const deckName = (localStorage.getItem("ankiDeck") || "").trim();
            const modelName = (localStorage.getItem("ankiModel") || "").trim();

            // ❌ BLOCK if not configured
            if (!deckName || !modelName) {
                alert("カードを追加する前に、設定で「デッキ名」と「メモの種類」の両方を設定してください。");
                return;
            }

            const fields = {
                "単語": document.getElementById('field-tango').value.trim(),
                "読み方": document.getElementById('field-yomikata').value.trim(),
                "振り仮名": document.getElementById('field-furigana').value.trim(),
                "意味": document.getElementById('field-imi').value.trim(),
                "例文": document.getElementById('field-reibun').value.trim(),
                "翻訳": document.getElementById('field-honyaku').value.trim()
            };

            toggleLoading(true, "追加中...");

            try {
                const res = await fetch('http://127.0.0.1:8765', {
                    method: 'POST',
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        action: "addNote",
                        version: 6,
                        params: {
                            note: {
                                deckName,
                                modelName,
                                fields,
                                options: {
                                    allowDuplicate: false
                                },
                                tags: ["yomitan-style-miner"]
                            }
                        }
                    })
                });

                const result = await res.json();

                if (result.error) {
                    alert(`Anki Error: ${result.error}`);
                    toggleLoading(false);
                } else {
                    document.getElementById('loading-text').innerText = "成功！";
                    await delay(1000);
                    clearFields();
                    toggleLoading(false);
                }

            } catch (err) {
                alert("Could not reach Anki. Is it open?");
                toggleLoading(false);
            }
        }

        function generateAnkiFurigana(word, reading) {
            if (word === reading) return word;
            let furigana = "";
            let wIdx = 0, rIdx = 0;
            while (wIdx < word.length) {
                let char = word[wIdx];
                if (char.match(/[一-龠々]/)) {
                    let kanjiRun = char;
                    wIdx++;
                    while (wIdx < word.length && word[wIdx].match(/[一-龠々]/)) {
                        kanjiRun += word[wIdx];
                        wIdx++;
                    }
                    let nextKana = word[wIdx] || "";
                    let targetIdx = nextKana ? reading.indexOf(nextKana, rIdx) : reading.length;
                    if (targetIdx === -1) targetIdx = reading.length;
                    let readingPart = reading.substring(rIdx, targetIdx);
                    furigana += ` ${kanjiRun}[${readingPart}]`;
                    rIdx = targetIdx;
                } else {
                    furigana += char;
                    wIdx++;
                    rIdx++;
                }
            }
            return furigana.trim();
        }
        lucide.createIcons();
    </script>
</body>

</html>
